<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>极傲炒菜机-网页控制端系统</title>
    <!-- 引入外部 CSS 文件 -->
    <script src="{{ url_for('static', filename='js/vue.js') }}"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tab.css') }}">
</head>
<body>
    <div class="connect_outframe">  
      <div class="connect_container">
        <div class="connectstatus_row">
             <div class="connect_word">
                连接状态:
             </div>
             <div class="connect_status" id="connect_status">
                未连接
            </div>
        </div>
        <div class="connectbtn_row nomb">
            <button onclick="connect()" class="mainconnectbtn">
                <svg t="1770446936087" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="17953" width="200" height="200"><path d="M561.312 68.191h-98.624v493.121h98.624V68.192z m238.423 106.76l-69.776 69.777c77.42 63.366 127.226 159.277 127.226 267.271 0 190.59-154.593 345.185-345.185 345.185S166.815 702.59 166.815 512c0-107.994 49.806-203.905 127.226-267.271l-69.776-69.776C129.09 256.317 68.19 376.885 68.19 512c0 245.08 198.728 443.809 443.809 443.809S955.809 757.08 955.809 512c0-135.115-60.901-255.683-156.074-337.048z" p-id="17954" fill="#515151"></path></svg>
                <span>连接炒菜机</span>
            </button>
            <button onclick="disconnect()">断开连接</button>
        </div>
      </div>
      <div class="top_container">
         <div class="stopallbtn">
            <button onclick="stopall()">紧急停止</button>
         </div>
         <div class="enableallbtn">
            <button onclick="enableall()">重新使能</button>
         </div>   
      </div>
    </div>  

    <div class="tab-buttons">
        <button class="active" onclick="showTab(1, this)">手动操控区</button>
        <button onclick="showTab(2, this)">测试区</button>
        <button onclick="showTab(3, this)">自动程序区</button>
        <button onclick="showTab(4, this)">加料板</button>
    </div>

    <div id="tab1" class="tab-content" style="display:block;">
    <div class="speed_container">
        <label>电机速度:</label>
        <label>
            <input type="radio" name="speed" value="1" checked> 1
        </label><br>
        
        <label>
            <input type="radio" name="speed" value="2"> 2
        </label><br>
        
        <label>
            <input type="radio" name="speed" value="3"> 3
        </label>

        <label>
            <input type="radio" name="speed" value="4"> 4
        </label>

        <label>
            <input type="radio" name="speed" value="5"> 5
        </label>
    </div>

    <div class="function_container">
        <button onclick="resetMotor(1,'left')">
            <svg t="1770446282020" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="12159" width="200" height="200"><path d="M376.362667 395.989333a42.666667 42.666667 0 0 1-59.392 61.269334l-176-170.666667a42.666667 42.666667 0 0 1 0-61.269333l176-170.666667A42.666667 42.666667 0 0 1 376.32 115.925333L275.968 213.290667H853.333333a42.666667 42.666667 0 1 1 0 85.333333H275.968L376.32 395.989333zM647.637333 908.032a42.666667 42.666667 0 1 0 59.392 61.269333l176-170.666666a42.666667 42.666667 0 0 0 0-61.269334l-176-170.666666a42.666667 42.666667 0 1 0-59.392 61.269333L748.032 725.333333H170.666667a42.666667 42.666667 0 1 0 0 85.333334h577.365333l-100.394667 97.365333z" p-id="12160" fill="#515151"></path></svg>            
            <span>1号锅水平复位</span>
        </button>
        <button onclick="resetMotor(2,'right')">
            <svg t="1770446282020" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="12159" width="200" height="200"><path d="M376.362667 395.989333a42.666667 42.666667 0 0 1-59.392 61.269334l-176-170.666667a42.666667 42.666667 0 0 1 0-61.269333l176-170.666667A42.666667 42.666667 0 0 1 376.32 115.925333L275.968 213.290667H853.333333a42.666667 42.666667 0 1 1 0 85.333333H275.968L376.32 395.989333zM647.637333 908.032a42.666667 42.666667 0 1 0 59.392 61.269333l176-170.666666a42.666667 42.666667 0 0 0 0-61.269334l-176-170.666666a42.666667 42.666667 0 1 0-59.392 61.269333L748.032 725.333333H170.666667a42.666667 42.666667 0 1 0 0 85.333334h577.365333l-100.394667 97.365333z" p-id="12160" fill="#515151"></path></svg>            
            <span>2号锅水平复位</span>
        </button>
        <button onclick="resetMotor(1,'up')">
            <svg t="1770446568091" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="23749" width="200" height="200"><path d="M494.03 74.72l-109.59 144.09c-12.48 16.41-5.82 29.97 14.79000001 30.09L482 249.47 482 774.53l-82.77 0.54c-20.64 0.15-27.27 13.68-14.79 30.09l109.59 144.09c12.48 16.41 32.43 16.05 44.31000001-0.81l101.81999999-144.51c11.88-16.86 4.74-30.54-15.9-30.39L542.00000001 774.14l-1e-8-524.25 82.23 0.54c20.64 0.15 27.78-13.53 15.9-30.39l-101.82-144.51c-11.88-16.86-31.8-17.25-44.28-0.81z" p-id="23750" fill="#515151"></path></svg>
            <span>1号锅翻转复位</span>
        </button>
        <button onclick="resetMotor(2,'up')">
            <svg t="1770446568091" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="23749" width="200" height="200"><path d="M494.03 74.72l-109.59 144.09c-12.48 16.41-5.82 29.97 14.79000001 30.09L482 249.47 482 774.53l-82.77 0.54c-20.64 0.15-27.27 13.68-14.79 30.09l109.59 144.09c12.48 16.41 32.43 16.05 44.31000001-0.81l101.81999999-144.51c11.88-16.86 4.74-30.54-15.9-30.39L542.00000001 774.14l-1e-8-524.25 82.23 0.54c20.64 0.15 27.78-13.53 15.9-30.39l-101.82-144.51c-11.88-16.86-31.8-17.25-44.28-0.81z" p-id="23750" fill="#515151"></path></svg>
            <span>2号锅翻转复位</span>
        </button>

        <button onclick="resetMotorPot(1)">
            <svg t="1770615650546" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="1621" width="200" height="200"><path d="M73.617261 633.231387a24.319042 24.319042 0 0 1-24.38304-24.319043V304.476331c0-90.236447 73.341112-158.329766 170.553285-158.329766H901.744654a24.319042 24.319042 0 0 1 0 48.702083H219.787506c-70.589221 0-121.787205 46.078186-121.787205 109.627683v304.372016a24.319042 24.319042 0 0 1-24.38304 24.38304zM804.212494 876.805796H98.000301a24.319042 24.319042 0 1 1 0-48.76608h706.212193c63.805488 0 121.787205-63.74149 121.787205-133.946726V414.104015a24.319042 24.319042 0 1 1 48.702082 0v280.052973c0 97.340167-79.612865 182.648808-170.489287 182.648808z" fill="#515151" p-id="1622"></path><path d="M804.212494 340.954895a24.319042 24.319042 0 0 1-17.215322-41.598362l120.251265-120.251265a11.967529 11.967529 0 0 0 3.583859-8.63966 12.159521 12.159521 0 0 0-3.583859-8.703657L786.997172 41.510686c-9.471627-9.471627-9.471627-24.959017 0-34.430645s24.959017-9.471627 34.430644 0l120.251265 120.251265c11.583544 11.519546 17.791299 26.814944 17.7913 43.134302a60.349624 60.349624 0 0 1-17.7913 43.070304l-120.251265 120.251265a23.551073 23.551073 0 0 1-17.215322 7.167718zM219.787506 1022.97604a24.12705 24.12705 0 0 1-17.27932-7.231715l-120.251265-120.251265a60.925601 60.925601 0 0 1 0-86.204606l120.251265-120.251265a24.447037 24.447037 0 0 1 34.494642 34.558639l-120.187268 120.187268a12.159521 12.159521 0 0 0 0 17.343317l120.187268 120.251265a24.191047 24.191047 0 0 1 0 34.366647 24.319042 24.319042 0 0 1-17.215322 7.231715z" fill="#515151" p-id="1623"></path></svg>            
            <span>1号锅自动复位</span>
        </button>

        <button onclick="resetMotorPot(2)">
            <svg t="1770615650546" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="1621" width="200" height="200"><path d="M73.617261 633.231387a24.319042 24.319042 0 0 1-24.38304-24.319043V304.476331c0-90.236447 73.341112-158.329766 170.553285-158.329766H901.744654a24.319042 24.319042 0 0 1 0 48.702083H219.787506c-70.589221 0-121.787205 46.078186-121.787205 109.627683v304.372016a24.319042 24.319042 0 0 1-24.38304 24.38304zM804.212494 876.805796H98.000301a24.319042 24.319042 0 1 1 0-48.76608h706.212193c63.805488 0 121.787205-63.74149 121.787205-133.946726V414.104015a24.319042 24.319042 0 1 1 48.702082 0v280.052973c0 97.340167-79.612865 182.648808-170.489287 182.648808z" fill="#515151" p-id="1622"></path><path d="M804.212494 340.954895a24.319042 24.319042 0 0 1-17.215322-41.598362l120.251265-120.251265a11.967529 11.967529 0 0 0 3.583859-8.63966 12.159521 12.159521 0 0 0-3.583859-8.703657L786.997172 41.510686c-9.471627-9.471627-9.471627-24.959017 0-34.430645s24.959017-9.471627 34.430644 0l120.251265 120.251265c11.583544 11.519546 17.791299 26.814944 17.7913 43.134302a60.349624 60.349624 0 0 1-17.7913 43.070304l-120.251265 120.251265a23.551073 23.551073 0 0 1-17.215322 7.167718zM219.787506 1022.97604a24.12705 24.12705 0 0 1-17.27932-7.231715l-120.251265-120.251265a60.925601 60.925601 0 0 1 0-86.204606l120.251265-120.251265a24.447037 24.447037 0 0 1 34.494642 34.558639l-120.187268 120.187268a12.159521 12.159521 0 0 0 0 17.343317l120.187268 120.251265a24.191047 24.191047 0 0 1 0 34.366647 24.319042 24.319042 0 0 1-17.215322 7.231715z" fill="#515151" p-id="1623"></path></svg>            
            <span>2号锅自动复位</span>
        </button>
    </div>
    

    <div class="motor_container">
        <div class="motor">
            <div class="motor_row fcenter">
                <button ontouchstart="startMotor(1, 'up')" ontouchend="pauseMotor(1,'up')">向内翻转</button>
            </div>
            <div class="motor_row">
                <button ontouchstart="startMotor(1, 'left')" ontouchend="pauseMotor(1,'left')">向左移动</button>
                <div class="motor_tag">1号锅</div>
                <button ontouchstart="startMotor(1, 'right')" ontouchend="pauseMotor(1,'right')">向右移动</button>
            </div>
            <div class="motor_row fcenter nomt10">
                <button ontouchstart="startMotor(1, 'down')" ontouchend="pauseMotor(1,'down')">向外翻转</button>
            </div>
        </div>
        <div class="motor ">
            <div class="motor_row fcenter">
                <button ontouchstart="startMotor(2, 'up')" ontouchend="pauseMotor(2,'up')">向内翻转</button>
            </div>
            <div class="motor_row">
                <button ontouchstart="startMotor(2, 'left')" ontouchend="pauseMotor(2,'left')">向左移动</button>
                <div class="motor_tag">2号锅</div>
                <button ontouchstart="startMotor(2, 'right')" ontouchend="pauseMotor(2,'right')">向右移动</button>
            </div>
            <div class="motor_row fcenter nomt10">
                <button ontouchstart="startMotor(2, 'down')" ontouchend="pauseMotor(2,'down')">向外翻转</button>
            </div>
        </div>
    </div>

    </div>
    <div id="tab2" class="tab-content">
        <div class="input_container">
            <div class="input_circle">
                <label for="circles" class="input_tag">目标运行位置:</label>
                <input class="input-classic" type="number" id="circlevalabs" placeholder="请输入目标的绝对位置数值" />
            </div>
            <div class="function_container">
                <button onclick="runMotorabs(1,'left')">1号锅水平绝对移动</button>
                <button onclick="runMotorabs(2,'left')">2号锅水平绝对移动</button>
                <button onclick="runMotorabs(1,'up')">1号锅绝对翻转移动</button>
                <button onclick="runMotorabs(2,'up')">2号锅绝对翻转移动</button>
            </div>
            <hr style="border: 1px solid #ccc; width: 100%; margin: 2px auto;">
            <div class="function_container">
                <button onclick="goPos(1,'pos_outfood')">1号锅外倒菜位</button>
                <button onclick="goPos(1,'pos_infood')">1号锅内倒菜位</button>
                <button onclick="goPos(1,'pos_washpot')">1号锅洗锅位</button>
                <button onclick="goPos(1,'pos_firepot')">1号锅烧菜位</button>
            </div>
             <hr style="border: 1px solid #ccc; width: 100%; margin: 2px auto;">
             <div class="function_container">
                <button onclick="readPulse(0)">读取全部已转脉冲</button>
                <button onclick="readPulse(1)">读取单电机已转脉冲</button>
             </div>
             <hr style="border: 1px solid #ccc; width: 100%; margin: 2px auto;">
             <div class="fb_display" id="motor_status">
                <span class="fb_realtime">实时反馈位置：</span>
                <div class="fb_display_row">
                    <label>1号锅翻转电机:</label>
                    <div>${ motor1_flip }</div>
                </div>
                <div class="fb_display_row">
                    <label>1号锅水平电机:</label>
                    <div>${ motor1_level }</div>
                </div>
                <div class="fb_display_row">
                    <label>2号锅翻转电机:</label>
                    <div>${ motor2_flip }</div>
                </div>
                <div class="fb_display_row">
                    <label>2号锅水平电机:</label>
                    <div>${ motor2_level }</div>
                </div>
             </div>
        </div>

    </div>

    <div id="tab3" class="tab-content" >
        <div class="fb_display" id="motor_status2">
            <span class="fb_realtime">实时反馈位置：</span>
            <div class="fb_display_row">
                <label>1号锅翻转电机:</label>
                <div>${ motor1_flip }</div>
            </div>
            <div class="fb_display_row">
                <label>1号锅水平电机:</label>
                <div>${ motor1_level }</div>
            </div>
            <div class="fb_display_row">
                <label>2号锅翻转电机:</label>
                <div>${ motor2_flip }</div>
            </div>
            <div class="fb_display_row">
                <label>2号锅水平电机:</label>
                <div>${ motor2_level }</div>
            </div>
        </div>

        <hr style="border: 1px solid #ccc; width: 100%; margin: 2px auto;">

        <div class="input_circle">
            <label for="circles" class="input_tag">水平速度(角度/秒):</label>
            <input class="input-classic" type="number" id="speed_level" placeholder="请输入水平移动速度" value="2160"/>
        </div>
        <div class="input_circle">
            <label for="circles" class="input_tag">翻转速度(角度/秒):</label>
            <input class="input-classic" type="number" id="speed_flip" placeholder="请输入翻转速度" value="2520"/>
        </div>
        <div class="function_container">
            <button onclick="testMultiTaskabs()">1号锅洗锅倒菜程序</button>
            <button onclick="testMultiTaskabs2()">2号锅洗锅倒菜程序</button>
        </div>
    </div>
    <div id="tab4" class="tab-content" >
        <div class="input_container">
            <div class="tastmotorid_select_row">
                <label for="tastmotorid">电机号:</label>
                <select id="tastmotorid" name="tastmotorid">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                    <option value="13">13</option>
                    <option value="14">14</option>
                    <option value="15">15</option>
                    <option value="16">16</option>
                    <option value="17">17</option>
                    <option value="18">18</option>
                    <option value="19">19</option>
                    <option value="20">20</option>
                    <option value="21">21</option>
                    <option value="22">22</option>
                    <option value="23">23</option>
                    <option value="24">24</option>
                </select>
            </div>
            <div class="input_circle">
                <label for="tastmotorovertime" class="input_tag">持续时间:</label>
                <input class="input-classic" type="number" id="tastmotorovertime" placeholder="请输入电机打开时间(ms)" />
            </div>
            <div class="function_container">
                <button onclick="testTastBoardPing()">测试板连通性</button>
                <button onclick="runTastMotor()">打开电机</button>
                <button onclick="getTastMotorFb(1)">获取单电机反馈</button>
                <button onclick="getTastMotorFb(0)">获取所有电机反馈</button>
            </div>
        </div>
    </div>

    <div class="prompt">控制台消息</div>
    <div id="status-history"></div> <!-- 用于显示历史消息 -->

    <!-- 引入外部 JS 文件 -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
