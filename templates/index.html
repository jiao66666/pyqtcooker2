<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>极傲炒菜机-网页控制端系统</title>
    <!-- 引入外部 CSS 文件 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h3>极傲炒菜机-网页控制端系统</h1>

    <div class="connect_container">
        <div class="port_row">
            <label for="port">端口:</label>
            <select id="port_select" name="port_select">
                <option value="COM1">COM1</option>
                <option value="COM2">COM2</option>
                <option value="COM3">COM3</option>
                <option value="COM4">COM4</option>
                <option value="COM5">COM5</option>
                <option value="COM6" selected>COM6</option>
                <option value="COM7">COM7</option>
                <option value="COM8">COM8</option>
                <option value="COM9">COM9</option>
                <option value="COM10">COM10</option>
            </select>
        </div>
        <div class="baud_row">
            <label for="baud">波特率:</label>
            <select id="baud_select" name="baud_select">
                <option value="9600">9600</option>
                <option value="19200">19200</option>
                <option value="38400">38400</option>
                <option value="57600">57600</option>
                <option value="115200" selected>115200</option>
            </select>
            <div class="connect_status">
                未连接
            </div>
        </div>
        <div class="connectbtn_row nomb">
            <button onclick="connect()">连接串口</button>
            <button onclick="disconnect()">断开连接</button>
            <button onclick="fixmotor()">电机异常修复</button>
        </div>
        <div class="function_container">
            <button onclick="resetMotor(1,'left')">1号锅水平复位</button>
            <button onclick="resetMotor(1,'up')">1号锅翻转复位</button>
            <button onclick="resetMotor(2,'right')">2号锅水平复位</button>
            <button onclick="resetMotor(2,'up')">2号锅翻转复位</button>
        </div>
    </div>

    <hr style="border: 1px solid #ccc; width: 100%; margin: 10px auto;">

    <div class="speed_container">
        <label>电机速度选择:</label>
        <label>
            <input type="radio" name="speed" value="1" checked> 1档
        </label><br>
        
        <label>
            <input type="radio" name="speed" value="2"> 2档
        </label><br>
        
        <label>
            <input type="radio" name="speed" value="3"> 3档
        </label>

        <label>
            <input type="radio" name="speed" value="4"> 4档
        </label>

        <label>
            <input type="radio" name="speed" value="5"> 5档
        </label>
    </div>

    <div class="motor_container">
        <div class="motor">
            <div class="motor_row fcenter">
                <button ontouchstart="startMotor(1, 'up')" ontouchend="stopMotor(1,'up')">向内翻转</button>
            </div>
            <div class="motor_row">
                <button ontouchstart="startMotor(1, 'left')" ontouchend="stopMotor(1,'left')">向左移动</button>
                <div class="motor_tag">1号锅</div>
                <button ontouchstart="startMotor(1, 'right')" ontouchend="stopMotor(1,'right')">向右移动</button>
            </div>
            <div class="motor_row fcenter">
                <button ontouchstart="startMotor(1, 'down')" ontouchend="stopMotor(1,'down')">向外翻转</button>
            </div>
        </div>
        <div class="motor ">
            <div class="motor_row fcenter">
                <button ontouchstart="startMotor(2, 'up')" ontouchend="stopMotor(2,'up')">向内翻转</button>
            </div>
            <div class="motor_row">
                <button ontouchstart="startMotor(2, 'left')" ontouchend="stopMotor(2,'left')">向左移动</button>
                <div class="motor_tag">2号锅</div>
                <button ontouchstart="startMotor(2, 'right')" ontouchend="stopMotor(2,'right')">向右移动</button>
            </div>
            <div class="motor_row fcenter">
                <button ontouchstart="startMotor(2, 'down')" ontouchend="stopMotor(2,'down')">向外翻转</button>
            </div>
        </div>
    </div>

    <div class="prompt">控制台消息</div>
    <div id="status-history"></div> <!-- 用于显示历史消息 -->

    <!-- 引入外部 JS 文件 -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
