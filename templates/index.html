    <div class="motor_container">
        <div class="motor">
            <div class="motor_row fcenter">
                <button 
                    onpointerdown="startMotor(1,'up')"
                    onpointerup="pauseMotor(1,'up')"
                    onpointercancel="pauseMotor(1,'up')"
                    onpointerleave="pauseMotor(1,'up')"
                >向内翻转</button>
            </div>
            <div class="motor_row">
                <button
                    onpointerdown="startMotor(1,'left')"
                    onpointerup="pauseMotor(1,'left')"
                    onpointercancel="pauseMotor(1,'left')"
                    onpointerleave="pauseMotor(1,'left')"
                >向左移动</button>
                <div class="motor_tag">1号锅</div>
                <button
                    onpointerdown="startMotor(1,'right')"
                    onpointerup="pauseMotor(1,'right')"
                    onpointercancel="pauseMotor(1,'right')"
                    onpointerleave="pauseMotor(1,'right')"
                >向右移动</button>
            </div>
            <div class="motor_row fcenter nomt10">
                <button
                    onpointerdown="startMotor(1,'down')"
                    onpointerup="pauseMotor(1,'down')"
                    onpointercancel="pauseMotor(1,'down')"
                    onpointerleave="pauseMotor(1,'down')"
                >向外翻转</button>
            </div>
        </div>
        <div class="motor ">
            <div class="motor_row fcenter">
                <button
                    onpointerdown="startMotor(2,'up')"
                    onpointerup="pauseMotor(2,'up')"
                    onpointercancel="pauseMotor(2,'up')"
                    onpointerleave="pauseMotor(2,'up')"
                >向内翻转</button>
            </div>
            <div class="motor_row">
                <button
                    onpointerdown="startMotor(2,'left')"
                    onpointerup="pauseMotor(2,'left')"
                    onpointercancel="pauseMotor(2,'left')"
                    onpointerleave="pauseMotor(2,'left')"
                >向左移动</button>
                <div class="motor_tag">2号锅</div>
                <button
                    onpointerdown="startMotor(2,'right')"
                    onpointerup="pauseMotor(2,'right')"
                    onpointercancel="pauseMotor(2,'right')"
                    onpointerleave="pauseMotor(2,'right')"
                >向右移动</button>
            </div>
            <div class="motor_row fcenter nomt10">
                <button
                    onpointerdown="startMotor(2,'down')"
                    onpointerup="pauseMotor(2,'down')"
                    onpointercancel="pauseMotor(2,'down')"
                    onpointerleave="pauseMotor(2,'down')"
                >向外翻转</button>
            </div>
        </div>
    </div>

    </div>

    <div id="tab3" class="tab-content" >
       
        <div class="input_circle">
            <label for="circles" class="input_tag">水平速度(角度/秒):</label>
            <input class="input-classic" type="number" id="speed_level" placeholder="请输入水平移动速度" value="2160"/>
